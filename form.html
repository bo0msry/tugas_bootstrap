<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card border-0 shadow-sm p-4 bg-white rounded-3">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold text-primary text-uppercase">Buat Account Baru!</h1>
                        <p class="text-muted small">Sign Up Form</p>
                    </div>
                    <form action="welcome.html">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">First Name:</label>
                            <input type="text" class="form-control" name="first_name" placeholder="Nama depan Anda" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Last Name:</label>
                            <input type="text" class="form-control" name="last_name" placeholder="Nama belakang Anda" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold d-block">Gender:</label>
                            <div class="form-check form-check-inline">
                               <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                               <label class="form-check-label" for="male">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                               <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                               <label class="form-check-label" for="female">Female</label>
                            </div>
                            <div class="form-check form-check-inline">
                               <input class="form-check-input" type="radio" name="gender" id="other_gender" value="other">
                               <label class="form-check-label" for="other_gender">Other</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nationality:</label>
                            <select class="form-select" name="nationality">
                                <option value="indonesian" selected>Indonesian</option>
                                <option value="english">English</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold d-block">Language Spoken:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="language" id="lang_bahasa" value="bahasa">
                                <label class="form-check-label" for="lang_bahasa">Bahasa Indonesia</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="language" id="lang_english" value="english">
                                <label class="form-check-label" for="lang_english">English</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="language" id="lang_other" value="other">
                                <label class="form-check-label" for="lang_other">Other</label>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Bio:</label>
                            <textarea class="form-control" name="bio" rows="4" placeholder="Ceritakan sedikit tentang diri Anda..."></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold py-2 shadow-sm">Sign Up</button>
                        </div>

                    </form>
                </div> </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
