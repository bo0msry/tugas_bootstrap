<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Data Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">                
                <div class="card border-0 shadow-sm p-4 bg-white rounded-3">
                    <h1 class="h3 fw-bold text-primary text-center text-uppercase mb-4">
                        Daftar Nilai Siswa
                    </h1>
                    <div class="table-responsive mb-4">
                        <table class="table table-bordered table-striped table-hover text-center align-middle">
                            <thead class="table-primary text-white">
                                <tr>
                                    <th rowspan="2" class="align-middle bg-danger bg-opacity-75 text-white">Nama</th>
                                    <th colspan="3" class="bg-danger bg-opacity-50 text-white">Nilai</th>
                                </tr>
                                <tr class="table-danger text-dark">
                                    <th>Kimia</th>
                                    <th>Fisika</th>
                                    <th>Biologi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="fw-semibold text-start ps-3">Robby</td>
                                    <td><span class="badge bg-secondary">76</span></td>
                                    <td><span class="badge bg-secondary">80</span></td>
                                    <td><span class="badge bg-secondary">81</span></td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold text-start ps-3">Rendi</td>
                                    <td><span class="badge bg-secondary">84</span></td>
                                    <td><span class="badge bg-secondary">70</span></td>
                                    <td><span class="badge bg-secondary">75</span></td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold text-start ps-3">Alfian</td>
                                    <td><span class="badge bg-success">96</span></td>
                                    <td><span class="badge bg-secondary">70</span></td>
                                    <td><span class="badge bg-secondary">71</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <hr class="my-3">
                    <div class="d-flex justify-content-between">
                        <a href="index.html" class="btn btn-outline-secondary px-4">
                             Kembali ke Index
                        </a>
                        <a href="form.html" class="btn btn-primary px-4">
                             Kembali ke Form
                        </a>
                    </div>
                </div> </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
